{% extends "base.html" %}
{% block title %}Verify 2FA — VaultX{% endblock %}
{% block content %}
<div class="center-screen">
  <div class="panel">
    <div class="brand-lockup"><span class="brand-shield">VX</span><span class="brand-name">VaultX</span></div>
    <div class="badge-pill">🔐 Step 2 of 2</div>
    <h1>Enter your code 🔑</h1>
    <p class="subtitle">Open your authenticator app and enter the current 6-digit code.</p>

    <div id="banner" class="banner"></div>

    <div class="otp-boxes" id="otpContainer">
      <input type="text" inputmode="numeric" maxlength="1">
      <input type="text" inputmode="numeric" maxlength="1">
      <input type="text" inputmode="numeric" maxlength="1">
      <input type="text" inputmode="numeric" maxlength="1">
      <input type="text" inputmode="numeric" maxlength="1">
      <input type="text" inputmode="numeric" maxlength="1">
    </div>

    <button class="btn btn-primary btn-block" id="verifyBtn">Verify &amp; sign in →</button>
    <p class="foot-note"><a href="/login">Back to login</a></p>
  </div>
</div>

<script src="/static/js/common.js"></script>
<script>
  const userId = sessionStorage.getItem("vaultx_user_id");
  if (!userId) {
    window.location.href = "/login";
  }

  wireOtpBoxes("#otpContainer");

  const banner = document.getElementById("banner");
  const verifyBtn = document.getElementById("verifyBtn");

  verifyBtn.addEventListener("click", async () => {
    hideBanner(banner);
    const otp_code = getOtpValue("#otpContainer");
    if (otp_code.length !== 6) {
      showBanner(banner, "Please enter all 6 digits.");
      return;
    }
    verifyBtn.disabled = true;
    verifyBtn.textContent = "Verifying...";

    try {
      await apiRequest("/api/login/mfa", {
        method: "POST",
        body: JSON.stringify({ otp_code, user_id: userId }),
      });
      sessionStorage.removeItem("vaultx_user_id");
      window.location.href = "/dashboard";
    } catch (err) {
      showBanner(banner, err.message);
      verifyBtn.disabled = false;
      verifyBtn.textContent = "Verify & sign in →";
    }
  });
</script>
{% endblock %}
